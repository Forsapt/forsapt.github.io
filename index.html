<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
          name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&family=Noto+Serif:wght@400;700&display=swap"
          rel="stylesheet">
    <link href="css/card.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <title>Forsapt</title>
</head>
<body>
<div class="header" style="justify-content: center">
    <a class="header__logo" href="/">Forsapt</a>
</div>
<div class="cards">
    <a class="card" href="coffee.html">
        <div class="card__image"><img alt="" src="https://cs9.pikabu.ru/post_img/2016/10/13/6/1476352445164888046.jpg">
        </div>
        <div class="card__content">
            <div class="card__title">Готовим идеальный кофе</div>
            <div class="card__description">
                10 ценных советов
            </div>
        </div>
    </a>
    <a class="card" href="tea.html">
        <div class="card__image"><img
                alt=""
                src="https://cdn.lifehacker.ru/wp-content/uploads/2012/10/01_1476301961-1280x640.jpg"></div>
        <div class="card__content">
            <div class="card__title">10 секретов вкусного чая</div>
            <div class="card__description">Мы собрали десять полезных советов по завариванию чая, из которых самый главный не имеет никакого отношения к кулинарии.
            </div>
        </div>
    </a>
</div>
<script>
  let host = "pixel-track-forsapt.herokuapp.com"
  let r = Math.random().toString(36).substring(7);
  let trackerId = 1;
  let path = window.location.href.split('//')[1].split('/').splice(1).join('/').split("#")[0].split('?')[0];
  if (path[path.length - 1] === '/') {
    path = path.substring(0, path.length - 1)
  }
  if (path == "") {
    path = '/'
  }
  let img = new Image();
  img.src = "http://" + host + "/api/record/" + r + ".png?path=" + path + "&trackerId=" + trackerId + "&r=" + r
  document.body.appendChild(img);
</script>


</body>
</html>
